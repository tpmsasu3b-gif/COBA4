<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Inventaris Mobile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .offline-container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            max-width: 320px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }
        
        .offline-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #1f2937;
            font-size: 24px;
            margin-bottom: 12px;
        }
        
        p {
            color: #6b7280;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 24px;
        }
        
        .btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .cached-data {
            margin-top: 20px;
            padding: 16px;
            background: #f3f4f6;
            border-radius: 12px;
            font-size: 14px;
            color: #4b5563;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>Anda Offline</h1>
        <p>Tidak dapat terhubung ke internet. Data yang tersimpan secara lokal masih dapat diakses.</p>
        <button class="btn" onclick="window.location.reload()">Coba Lagi</button>
        
        <div class="cached-data">
            <strong>💡 Tips:</strong> Perubahan yang Anda buat akan disinkronkan otomatis saat koneksi kembali.
        </div>
    </div>
</body>
</html>
